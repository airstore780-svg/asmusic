<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AS Music | Discover Your Vibe</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000000;
            /* Glass Effect: Light tint with high transparency */
            --card-bg: rgba(255, 255, 255, 0.06); 
            --accent: #6366f1;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            /* Deep, soft shadow for the "float" effect */
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            --nav-height: 70px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            /* Subtle radial gradient to give the background some depth */
            background: radial-gradient(circle at top right, #1e1b4b, #000000);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            padding: 30px 5% 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .profile-pic {
            width: 45px; height: 45px;
            border-radius: 15px;
            background-color: var(--accent);
            background-image: url('logo.jpg'); 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: var(--shadow);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px 5% 220px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            scrollbar-width: none;
        }
        main::-webkit-scrollbar { display: none; }

        .view { display: none; animation: fadeIn 0.5s ease; }
        .view.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-label {
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-sub);
            margin: 25px 0 15px;
            display: block;
            opacity: 0.8;
        }

        .track-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* --- Floating Glass Cards --- */
        .track-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px;
            background: var(--card-bg);
            /* The "Glass" Core */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            /* Thin highlight border for the edge */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
        }

        .track-row:hover {
            transform: translateY(-6px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .track-thumb {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        /* --- Floating Player Bar --- */
        .player-bar {
            position: fixed;
            bottom: 110px; /* Lifted higher */
            left: 20px;
            right: 20px;
            max-width: 600px; /* Narrower for a more "floating pill" look */
            margin: 0 auto;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 12px 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
        }

        .player-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .current-track-info {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 50%;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .play-btn {
            width: 42px; height: 42px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .progress-wrapper {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%; width: 0%;
            background: var(--accent);
        }

        /* --- Floating Nav Bar --- */
        nav.main-nav {
            position: fixed;
            bottom: 25px; /* Detached from bottom */
            left: 20px;
            right: 20px;
            max-width: 500px;
            margin: 0 auto;
            height: var(--nav-height);
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; /* Rounded corners for floating look */
            box-shadow: var(--shadow);
            z-index: 999;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-sub);
            font-size: 10px;
            font-weight: 600;
            gap: 4px;
            transition: all 0.3s;
        }

        .nav-item.active { color: var(--accent); transform: translateY(-2px); }

        /* --- Drawer Player --- */
        #player-drawer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(30px);
            z-index: 2000; transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex; flex-direction: column; align-items: center; padding: 60px 30px;
        }
        #player-drawer.open { transform: translateY(0); }
        .drawer-handle { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; position: absolute; top: 20px; }

        @media (max-width: 600px) {
            .player-bar { bottom: 110px; left: 15px; right: 15px; }
            nav.main-nav { bottom: 20px; width: 90%; }
        }
    </style>
</head>
<body>

<div id="app">
    <audio id="audio-engine"></audio>

    <header>
        <div>
            <h2 id="page-title">Home</h2>
            <p style="color: var(--text-sub); font-size: 13px;">Discover your vibe</p>
        </div>
        <a href="https://airestore.wixsite.com/store" target="_blank" style="text-decoration: none;">
    <div class="profile-pic"></div>
    </a>
    </header>

    <main>
        <section id="home" class="view active">
            <span class="section-label">Fresh Hits</span>
            <div id="home-grid" class="track-grid"></div>
        </section>

        <section id="browse" class="view">
            <span class="section-label">Explore Genres</span>
            <div class="track-grid">
                <div class="track-row" style="background: rgba(30, 58, 138, 0.3)">Hip Hop</div>
                <div class="track-row" style="background: rgba(127, 29, 29, 0.3)">Amapiano</div>
                <div class="track-row" style="background: rgba(6, 78, 59, 0.3)">Deep House</div>
                <div class="track-row" style="background: rgba(76, 29, 149, 0.3)">Rap</div>
            </div>
        </section>

        <section id="search" class="view">
            <span class="section-label">Quick Find</span>
            <input type="text" placeholder="Search tracks..." style="width:100%; padding:18px; border-radius:22px; border:1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline:none; backdrop-filter: blur(10px);">
        </section>

        <section id="library" class="view">
            <span class="section-label">My Collection</span>
            <div class="track-row">Liked Songs</div>
            <div class="track-row" style="margin-top:10px">Recently Played</div>
        </section>
    </main>

    <div class="player-bar" onclick="toggleDrawer(true)">
        <div class="player-top">
            <div class="current-track-info">
                <div id="p-thumb" class="track-thumb" style="background: #1e293b; width: 40px; height: 40px;">
                    <i data-lucide="music-4" size="16"></i>
                </div>
                <div style="overflow: hidden">
                    <div id="p-name" style="font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">No track selected</div>
                    <div id="p-artist" style="font-size: 11px; color: var(--text-sub);">Start listening</div>
                </div>
            </div>
            <div class="player-controls">
                <button class="play-btn" onclick="event.stopPropagation(); player.toggle()"><i data-lucide="play" id="play-icon" size="20"></i></button>
                <button onclick="event.stopPropagation(); player.next()" style="background:none; border:none; color:white; cursor:pointer"><i data-lucide="skip-forward" size="20"></i></button>
            </div>
        </div>
        <div class="progress-wrapper">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div id="player-drawer">
        <div class="drawer-handle" onclick="toggleDrawer(false)"></div>
        <div id="d-art" class="big-art" style="width:280px; height:280px; border-radius:40px; margin: 60px 0 40px; box-shadow: var(--shadow);"></div>
        <div class="drawer-info" style="text-align:center">
            <h1 id="d-name" style="font-size: 28px; margin-bottom: 8px;">Song Name</h1>
            <p id="d-artist" style="color: var(--text-sub); font-size: 18px;">Artist Name</p>
        </div>
        <div class="drawer-controls" style="display:flex; gap:40px; align-items:center; margin-top:50px;">
            <button onclick="player.prev()" style="background:none; border:none; color:white"><i data-lucide="skip-back" size="32"></i></button>
            <button class="play-btn" style="width:80px; height:80px" onclick="player.toggle()"><i data-lucide="play" size="32" class="d-play-icon"></i></button>
            <button onclick="player.next()" style="background:none; border:none; color:white"><i data-lucide="skip-forward" size="32"></i></button>
        </div>
    </div>

    <nav class="main-nav">
        <a href="#" class="nav-item active" onclick="navigate('home', this, 'Home')"><i data-lucide="home"></i><span>Home</span></a>
        <a href="#" class="nav-item" onclick="navigate('browse', this, 'Explore')"><i data-lucide="compass"></i><span>Browse</span></a>
        <a href="#" class="nav-item" onclick="navigate('search', this, 'Search')"><i data-lucide="search"></i><span>Search</span></a>
        <a href="#" class="nav-item" onclick="navigate('library', this, 'Library')"><i data-lucide="layers"></i><span>Library</span></a>
    </nav>
</div>

<script>
    const tracks = [
        { 
            name: "AS Music Production", 
            artist: "Produced by AS Music", 
            color: "#6366f1", 
            cover: "c1.jpg", 
            src: "as_music_production.mp3" 
        },
        { 
            name: "AS Music Production", 
            artist: "Produced by AS Music", 
            color: "#6366f1", 
            cover: "c1.jpg", 
            src: "as_music_production.mp3" 
        },
        { 
            name: "AS Music Production", 
            artist: "Produced by AS Music", 
            color: "#6366f1", 
            cover: "c1.jpg", 
            src: "as_music_production.mp3" 
        },
        { 
            name: "AS Music Production", 
            artist: "Produced by AS Music", 
            color: "#6366f1", 
            cover: "c1.jpg", 
            src: "as_music_production.mp3" 
        },
        { 
            name: "AS Music Production", 
            artist: "Produced by AS Music", 
            color: "#6366f1", 
            cover: "c1.jpg", 
            src: "as_music_production.mp3" 
        },
        { 
            name: "AS Music Production", 
            artist: "Produced by AS Music", 
            color: "#6366f1", 
            cover: "c1.jpg", 
            src: "as_music_production.mp3" 
        },
        { 
            name: "AS Music Production", 
            artist: "Produced by AS Music", 
            color: "#6366f1", 
            cover: "c1.jpg", 
            src: "as_music_production.mp3" 
        }
    ];

    const player = {
        currentIdx: -1,
        playing: false,
        audio: document.getElementById('audio-engine'),

        load(i) {
            this.currentIdx = i;
            const t = tracks[i];
            
            // Update UI
            document.getElementById('p-name').innerText = document.getElementById('d-name').innerText = t.name;
            document.getElementById('p-artist').innerText = document.getElementById('d-artist').innerText = t.artist;
            
            // Update Backgrounds/Covers
            const pThumb = document.getElementById('p-thumb');
            const dArt = document.getElementById('d-art');
            
            pThumb.style.backgroundImage = dArt.style.backgroundImage = `url(${t.cover})`;
            pThumb.style.backgroundSize = "cover";
            pThumb.style.backgroundColor = t.color; // Fallback
            pThumb.innerHTML = ""; // Clears the placeholder music icon

            // Load and Play Audio
            this.audio.src = t.src;
            this.audio.load();
            this.play();
        },

        toggle() {
            if(this.currentIdx === -1) return this.load(0);
            this.playing ? this.pause() : this.play();
        },

        play() {
            this.audio.play().catch(e => console.log("Interaction required"));
            this.playing = true;
            this.updateIcons('pause');
        },

        pause() {
            this.audio.pause();
            this.playing = false;
            this.updateIcons('play');
        },

        updateIcons(name) {
            document.getElementById('play-icon').setAttribute('data-lucide', name);
            const dIcon = document.querySelector('.d-play-icon');
            if(dIcon) dIcon.setAttribute('data-lucide', name);
            lucide.createIcons();
        },

        next() { this.load((this.currentIdx + 1) % tracks.length); },
        prev() { this.load((this.currentIdx - 1 + tracks.length) % tracks.length); }
    };

    // Replace the timer with real audio time updates
    player.audio.ontimeupdate = () => {
        if (player.audio.duration) {
            const progress = (player.audio.currentTime / player.audio.duration) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
        }
    };

    // Auto-play next track
    player.audio.onended = () => player.next();

    function toggleDrawer(open) {
        document.getElementById('player-drawer').classList.toggle('open', open);
    }

    function navigate(viewId, el, title) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('page-title').innerText = title;
    }

    function init() {
        const grid = document.getElementById('home-grid');
        tracks.forEach((t, i) => {
            const card = document.createElement('div');
            card.className = 'track-row';
            card.onclick = () => player.load(i);
            card.innerHTML = `
                <div class="track-thumb" style="background-image:url(${t.cover}); background-size:cover; background-color:${t.color}"></div>
                <div style="flex:1">
                    <div style="font-weight:700">${t.name}</div>
                    <div style="font-size:12px; color:var(--text-sub)">${t.artist}</div>
                </div>
                <i data-lucide="more-horizontal" color="#475569" size="20"></i>
            `;
            grid.appendChild(card);
        });
        lucide.createIcons();
    }

    init();
</script>
</body>
</html>
