<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AS Music</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #F8FAFC;
            --card-bg: rgba(255, 255, 255, 0.8);
            --accent: #6366f1;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --nav-height: 80px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- Header --- */
        header {
            padding: 30px 5% 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .profile-pic {
            width: 45px; 
            height: 45px;
            border-radius: 15px;
            background-color: var(--accent);
            /* --- LOGO FILE PATH CONFIG --- */
            background-image: url('logo.jpg'); 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            /* ----------------------------- */
            box-shadow: var(--shadow);
            cursor: pointer;
            border: 2px solid white;
        }

        /* --- Main Scrollable Content --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 20px 5% 180px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            scrollbar-width: none;
        }
        main::-webkit-scrollbar { display: none; }

        .view { display: none; animation: fadeIn 0.5s ease; }
        .view.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- UI Elements --- */
        .section-label {
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 12px;
            font-weight: 800;
            color: var(--text-sub);
            margin: 25px 0 15px;
            display: block;
        }

        .track-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .track-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: var(--card-bg);
            border: 1px solid white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
        }

        .track-row:hover {
            transform: translateY(-2px);
            background: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        }

        .track-thumb {
            width: 50px; height: 50px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white;
        }

        /* --- Persistent Player Bar --- */
        .player-bar {
            position: fixed;
            bottom: 100px;
            left: 5%;
            right: 5%;
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 15px 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: pointer;
        }

        .player-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .current-track-info {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 40%;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .play-btn {
            width: 45px; height: 45px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .play-btn:active { transform: scale(0.9); }

        .progress-wrapper {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.1s linear;
        }

        /* --- Drawer Player --- */
        #player-drawer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: white; z-index: 2000; transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex; flex-direction: column; align-items: center; padding: 60px 30px;
        }
        #player-drawer.open { transform: translateY(0); }
        .drawer-handle { width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; position: absolute; top: 15px; }
        .big-art { width: 80vw; max-width: 350px; aspect-ratio: 1; border-radius: 30px; background-size: cover; background-position: center; margin-bottom: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .drawer-info { text-align: center; margin-bottom: 40px; }
        .drawer-controls { display: flex; align-items: center; gap: 40px; }

        /* --- Bottom Navigation --- */
        nav.main-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: var(--nav-height);
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #f1f5f9;
            z-index: 999;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-sub);
            font-size: 11px;
            font-weight: 600;
            gap: 5px;
            transition: color 0.3s;
        }

        .nav-item.active { color: var(--accent); }

        @media (max-width: 600px) {
            .current-track-info { width: 60%; }
            .player-bar { bottom: 90px; padding: 12px 15px; }
            .track-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="app">
    <audio id="audio-engine"></audio>

    <header>
        <div>
            <h2 id="page-title">Home</h2>
            <p style="color: var(--text-sub); font-size: 13px;">Discover your vibe</p>
        </div>
        <div class="profile-pic"></div>
    </header>

    <main>
        <section id="home" class="view active">
            <span class="section-label">Fresh Hits</span>
            <div id="home-grid" class="track-grid"></div>
        </section>

        <section id="browse" class="view">
            <span class="section-label">Explore Genres</span>
            <div class="track-grid">
                <div class="track-row" style="background: #e0f2fe">Pop Essentials</div>
                <div class="track-row" style="background: #fef2f2">Chill Lofi</div>
                <div class="track-row" style="background: #f0fdf4">Deep House</div>
                <div class="track-row" style="background: #faf5ff">Indie Folk</div>
            </div>
        </section>

        <section id="search" class="view">
            <span class="section-label">Quick Find</span>
            <input type="text" placeholder="Search tracks or artists..." style="width:100%; padding:18px; border-radius:18px; border:1px solid #e2e8f0; outline:none; font-size:16px;">
        </section>

        <section id="library" class="view">
            <span class="section-label">My Collection</span>
            <div class="track-row">Liked Songs</div>
            <div class="track-row">Recently Played</div>
        </section>
    </main>

    <div class="player-bar" onclick="toggleDrawer(true)">
        <div class="player-top">
            <div class="current-track-info">
                <div id="p-thumb" class="track-thumb" style="background: #cbd5e1; width: 40px; height: 40px;">
                    <i data-lucide="music-4" size="18"></i>
                </div>
                <div style="overflow: hidden">
                    <div id="p-name" style="font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">No track selected</div>
                    <div id="p-artist" style="font-size: 11px; color: var(--text-sub);">Start listening</div>
                </div>
            </div>
            
            <div class="player-controls">
                <button onclick="event.stopPropagation(); player.prev()" style="background:none; border:none; color:var(--text-main); cursor:pointer"><i data-lucide="skip-back"></i></button>
                <button class="play-btn" onclick="event.stopPropagation(); player.toggle()"><i data-lucide="play" id="play-icon"></i></button>
                <button onclick="event.stopPropagation(); player.next()" style="background:none; border:none; color:var(--text-main); cursor:pointer"><i data-lucide="skip-forward"></i></button>
            </div>
        </div>
        <div class="progress-wrapper">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div id="player-drawer">
        <div class="drawer-handle" onclick="toggleDrawer(false)"></div>
        <div id="d-art" class="big-art"></div>
        <div class="drawer-info">
            <h1 id="d-name">Song Name</h1>
            <p id="d-artist">Artist Name</p>
        </div>
        <div class="drawer-controls">
            <button onclick="player.prev()" style="background:none; border:none;"><i data-lucide="skip-back" size="32"></i></button>
            <button class="play-btn" style="width:70px; height:70px;" onclick="player.toggle()"><i data-lucide="play" size="32" class="d-play-icon"></i></button>
            <button onclick="player.next()" style="background:none; border:none;"><i data-lucide="skip-forward" size="32"></i></button>
        </div>
    </div>

    <nav class="main-nav">
        <a href="#" class="nav-item active" onclick="navigate('home', this, 'Home')"><i data-lucide="home"></i><span>Home</span></a>
        <a href="#" class="nav-item" onclick="navigate('browse', this, 'Explore')"><i data-lucide="compass"></i><span>Browse</span></a>
        <a href="#" class="nav-item" onclick="navigate('search', this, 'Search')"><i data-lucide="search"></i><span>Search</span></a>
        <a href="#" class="nav-item" onclick="navigate('library', this, 'Library')"><i data-lucide="layers"></i><span>Library</span></a>
    </nav>
</div>

<script>
    const tracks = [
        { name: "Solar Flare", artist: "Nu-Logic", color: "#6366f1", src: "" },
        { name: "City Lights", artist: "Vibe Master", color: "#f43f5e", src: "" },
        { name: "Midnight Walk", artist: "Echo Boy", color: "#10b981", src: "" },
        { name: "Neon Dreams", artist: "Retro Future", color: "#8b5cf6", src: "" },
        { name: "Mountain High", artist: "Acoustic soul", color: "#f59e0b", src: "" },
        { name: "Deep Sea", artist: "Sub Zero", color: "#06b6d4", src: "" }
    ];

    const audio = document.getElementById('audio-engine');

    const player = {
        currentIdx: -1,
        playing: false,
        progress: 0,
        timer: null,

        load(i) {
            this.currentIdx = i;
            const t = tracks[i];
            document.getElementById('p-name').innerText = document.getElementById('d-name').innerText = t.name;
            document.getElementById('p-artist').innerText = document.getElementById('d-artist').innerText = t.artist;
            document.getElementById('p-thumb').style.backgroundColor = document.getElementById('d-art').style.backgroundColor = t.color;
            
            if(t.src) { audio.src = t.src; audio.play(); }
            this.progress = 0;
            this.play();
        },

        toggle() {
            if(this.currentIdx === -1) return this.load(0);
            this.playing ? this.pause() : this.play();
        },

        play() {
            this.playing = true;
            this.updateIcons('pause');
            this.startTicker();
        },

        pause() {
            this.playing = false;
            this.updateIcons('play');
            clearInterval(this.timer);
        },

        updateIcons(name) {
            document.getElementById('play-icon').setAttribute('data-lucide', name);
            const dIcon = document.querySelector('.d-play-icon');
            if(dIcon) dIcon.setAttribute('data-lucide', name);
            lucide.createIcons();
        },

        next() { this.load((this.currentIdx + 1) % tracks.length); },
        prev() { this.load((this.currentIdx - 1 + tracks.length) % tracks.length); },

        startTicker() {
            clearInterval(this.timer);
            this.timer = setInterval(() => {
                this.progress += 0.4;
                document.getElementById('progress-fill').style.width = this.progress + '%';
                if(this.progress >= 100) this.next();
            }, 100);
        }
    };

    function toggleDrawer(open) {
        document.getElementById('player-drawer').classList.toggle('open', open);
    }

    function navigate(viewId, el, title) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('page-title').innerText = title;
    }

    function init() {
        const grid = document.getElementById('home-grid');
        tracks.forEach((t, i) => {
            const card = document.createElement('div');
            card.className = 'track-row';
            card.onclick = () => player.load(i);
            card.innerHTML = `
                <div class="track-thumb" style="background:${t.color}"><i data-lucide="play-circle" size="20"></i></div>
                <div style="flex:1">
                    <div style="font-weight:700">${t.name}</div>
                    <div style="font-size:12px; color:var(--text-sub)">${t.artist}</div>
                </div>
                <i data-lucide="plus" color="#cbd5e1" size="18"></i>
            `;
            grid.appendChild(card);
        });
        lucide.createIcons();
    }

    init();
</script>
</body>
</html>
